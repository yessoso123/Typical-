<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>永恆深淵 Eternal Abyss</title>
<style>
/* ===== TOKENS ===== */
:root {
  --bg-deep: #0a0a12;
  --bg-panel: #12121e;
  --bg-card: #1a1a2e;
  --bg-hover: #22223a;
  --border: #2a2a4a;
  --border-glow: #4a3a8a;
  --text: #c8c0e8;
  --text-dim: #6a6090;
  --text-bright: #ede8ff;
  --accent: #7c4dff;
  --accent2: #b388ff;
  --gold: #ffd700;
  --red: #ff4466;
  --green: #44ff88;
  --cyan: #44ddff;

  /* Quality colors */
  --q-white: #d0d0d0;
  --q-blue: #4488ff;
  --q-yellow: #ffdd00;
  --q-green: #44cc66;
  --q-gold: #ff9900;
  --q-purple: #cc44ff;

  --radius: 6px;
  --font-main: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg-deep);
  color: var(--text);
  font-family: var(--font-main);
  font-size: 13px;
  min-height: 100vh;
  overflow: hidden;
  user-select: none;
}

/* ===== SCREENS ===== */
.screen { display: none; width: 100vw; height: 100vh; }
.screen.active { display: flex; }

/* ===== TITLE SCREEN ===== */
#title-screen {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: radial-gradient(ellipse at 50% 30%, #1a0a3a 0%, #0a0a12 70%);
  position: relative;
  overflow: hidden;
}
#title-screen::before {
  content: '';
  position: absolute;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%234a3a8a' fill-opacity='0.08'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.title-logo {
  font-size: 48px;
  font-weight: 900;
  letter-spacing: 4px;
  color: var(--text-bright);
  text-shadow: 0 0 40px var(--accent), 0 0 80px #4a1aaa;
  margin-bottom: 8px;
  position: relative;
}
.title-sub {
  font-size: 16px;
  letter-spacing: 8px;
  color: var(--accent2);
  text-transform: uppercase;
  margin-bottom: 48px;
  opacity: 0.8;
}
.title-btn {
  padding: 14px 40px;
  margin: 6px;
  font-size: 15px;
  font-family: var(--font-main);
  border: 1px solid var(--border-glow);
  border-radius: var(--radius);
  background: transparent;
  color: var(--text-bright);
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 2px;
  min-width: 200px;
}
.title-btn:hover { background: var(--accent); border-color: var(--accent2); box-shadow: 0 0 20px var(--accent); }
.title-btn.primary { background: var(--accent); border-color: var(--accent2); }
.title-btn.primary:hover { background: #9966ff; box-shadow: 0 0 30px var(--accent); }

/* ===== NEW GAME SCREEN ===== */
#newgame-screen {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--bg-deep);
  gap: 20px;
  padding: 20px;
}
.ng-title { font-size: 24px; color: var(--text-bright); letter-spacing: 3px; }
.class-grid { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
.class-card {
  width: 140px;
  padding: 16px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-card);
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}
.class-card:hover, .class-card.selected {
  border-color: var(--accent);
  background: var(--bg-hover);
  box-shadow: 0 0 16px #4a1aaa44;
}
.class-icon { font-size: 36px; margin-bottom: 8px; }
.class-name { font-size: 15px; font-weight: 700; color: var(--text-bright); margin-bottom: 4px; }
.class-desc { font-size: 11px; color: var(--text-dim); line-height: 1.5; }
.gender-row { display: flex; gap: 12px; }
.gender-btn {
  padding: 10px 32px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-card);
  color: var(--text);
  cursor: pointer;
  font-family: var(--font-main);
  transition: all 0.2s;
  font-size: 14px;
}
.gender-btn:hover, .gender-btn.selected { border-color: var(--accent); color: var(--text-bright); background: var(--bg-hover); }
.name-input {
  padding: 10px 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-card);
  color: var(--text-bright);
  font-family: var(--font-main);
  font-size: 14px;
  width: 260px;
  outline: none;
}
.name-input:focus { border-color: var(--accent); }

/* ===== MAIN GAME ===== */
#game-screen {
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}
.top-bar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 8px 16px;
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.player-avatar { font-size: 24px; }
.player-info { flex: 1; }
.player-name { font-size: 14px; font-weight: 700; color: var(--text-bright); }
.player-class { font-size: 11px; color: var(--accent2); }
.bar-group { display: flex; flex-direction: column; gap: 3px; min-width: 140px; }
.bar-label { font-size: 10px; color: var(--text-dim); display: flex; justify-content: space-between; }
.bar-track { height: 8px; background: #1a1a2e; border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
.hp-fill { background: linear-gradient(90deg, #cc2244, #ff4466); }
.exp-fill { background: linear-gradient(90deg, #5533aa, #7c4dff); }
.gold-display { font-size: 13px; color: var(--gold); font-weight: 700; }
.menu-tabs {
  display: flex;
  gap: 4px;
  padding: 0 16px;
  margin-left: auto;
}
.tab-btn {
  padding: 4px 12px;
  border: none;
  border-radius: var(--radius);
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  font-family: var(--font-main);
  font-size: 12px;
  transition: all 0.15s;
}
.tab-btn:hover { color: var(--text); background: var(--bg-card); }
.tab-btn.active { color: var(--text-bright); background: var(--bg-card); border-bottom: 2px solid var(--accent); }

/* ===== MAIN PANELS ===== */
.game-body {
  display: flex;
  flex: 1;
  overflow: hidden;
  gap: 1px;
  background: var(--border);
}
.panel {
  background: var(--bg-panel);
  overflow-y: auto;
  padding: 12px;
}
.panel-left { width: 220px; flex-shrink: 0; }
.panel-center { flex: 1; display: flex; flex-direction: column; }
.panel-right { width: 260px; flex-shrink: 0; }

/* Content panels */
.content-panel { display: none; flex: 1; flex-direction: column; }
.content-panel.active { display: flex; }

/* ===== BATTLE PANEL ===== */
.battle-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 16px;
  gap: 16px;
  position: relative;
  min-height: 0;
}
.zone-header {
  text-align: center;
  padding: 8px 16px;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
}
.zone-name { font-size: 16px; font-weight: 700; color: var(--accent2); }
.zone-info { font-size: 11px; color: var(--text-dim); }

.battle-stage {
  display: flex;
  align-items: center;
  justify-content: space-around;
  width: 100%;
  max-width: 500px;
  gap: 24px;
}
.combatant {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  flex: 1;
}
.combatant-sprite {
  font-size: 52px;
  filter: drop-shadow(0 0 10px #4a1aaa);
  transition: transform 0.1s;
}
.combatant-sprite.attack-anim { transform: scale(1.2); }
.combatant-sprite.hit-anim { filter: drop-shadow(0 0 16px #ff4466) brightness(2); }
.combatant-name { font-size: 12px; font-weight: 700; color: var(--text-bright); }
.combatant-hp-bar { width: 100%; height: 10px; background: #1a1a2e; border-radius: 5px; overflow: hidden; border: 1px solid #2a2a4a; }
.combatant-hp-fill { height: 100%; border-radius: 5px; transition: width 0.3s; }
.player-hp-c { background: linear-gradient(90deg, #cc2244, #ff4466); }
.enemy-hp-c { background: linear-gradient(90deg, #226611, #44cc22); }
.combatant-hp-text { font-size: 10px; color: var(--text-dim); }

.vs-text { font-size: 20px; font-weight: 900; color: var(--accent); opacity: 0.5; }

.battle-log {
  width: 100%;
  max-width: 500px;
  height: 120px;
  overflow-y: auto;
  background: #0d0d1a;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px;
  font-size: 11px;
  line-height: 1.8;
}
.log-dmg { color: #ff8888; }
.log-kill { color: var(--gold); }
.log-loot { color: var(--q-green); }
.log-skill { color: var(--accent2); }
.log-level { color: #ffff44; font-weight: 700; }
.log-miss { color: var(--text-dim); }

.battle-controls {
  display: flex;
  gap: 8px;
  padding: 8px 16px;
  background: var(--bg-card);
  border-top: 1px solid var(--border);
  align-items: center;
}
.battle-toggle {
  padding: 8px 20px;
  border: 1px solid var(--border-glow);
  border-radius: var(--radius);
  background: var(--accent);
  color: white;
  cursor: pointer;
  font-family: var(--font-main);
  font-weight: 700;
  transition: all 0.2s;
}
.battle-toggle:hover { background: #9966ff; }
.battle-toggle.paused { background: var(--bg-card); color: var(--text-dim); }
.battle-speed {
  display: flex;
  gap: 4px;
}
.speed-btn {
  padding: 4px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-card);
  color: var(--text-dim);
  cursor: pointer;
  font-size: 11px;
  font-family: var(--font-main);
}
.speed-btn.active { border-color: var(--accent); color: var(--text-bright); }

/* floating damage */
.float-dmg {
  position: absolute;
  font-size: 18px;
  font-weight: 900;
  pointer-events: none;
  animation: floatUp 0.8s ease-out forwards;
}
@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-60px); }
}

/* ===== LEFT PANEL - MAP ===== */
.section-title {
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-dim);
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}
.map-zone {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px;
  border-radius: var(--radius);
  border: 1px solid transparent;
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 2px;
}
.map-zone:hover { background: var(--bg-hover); border-color: var(--border); }
.map-zone.active-zone { background: var(--bg-hover); border-color: var(--accent); }
.map-zone.locked { opacity: 0.35; cursor: not-allowed; }
.zone-icon { font-size: 18px; }
.zone-text { flex: 1; }
.zone-zname { font-size: 12px; color: var(--text-bright); }
.zone-level { font-size: 10px; color: var(--text-dim); }

/* ===== LEFT PANEL - STATS ===== */
.stat-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 0;
  border-bottom: 1px solid #1a1a2a;
}
.stat-name { font-size: 12px; color: var(--text-dim); }
.stat-val { font-size: 12px; color: var(--text-bright); font-weight: 700; }
.stat-btn {
  padding: 1px 6px;
  border: 1px solid var(--accent);
  border-radius: 3px;
  background: transparent;
  color: var(--accent);
  cursor: pointer;
  font-size: 11px;
  margin-left: 4px;
  font-family: var(--font-main);
}
.stat-btn:hover { background: var(--accent); color: white; }
.attr-points { font-size: 12px; color: var(--gold); margin: 8px 0 4px; }

/* ===== RIGHT PANEL - EQUIPMENT ===== */
.equip-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  grid-template-rows: repeat(3, auto);
  gap: 4px;
  margin-bottom: 8px;
}
.equip-slot {
  padding: 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-card);
  cursor: pointer;
  text-align: center;
  min-height: 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  position: relative;
}
.equip-slot:hover { border-color: var(--accent); background: var(--bg-hover); }
.equip-slot.has-item { border-color: var(--border-glow); }
.equip-slot-label { font-size: 9px; color: var(--text-dim); position: absolute; top: 3px; left: 4px; }
.equip-slot-icon { font-size: 20px; }
.equip-slot-name { font-size: 9px; margin-top: 2px; line-height: 1.2; }
.equip-slot.center-slot { grid-column: 2; }

/* ===== INVENTORY ===== */
.inv-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 3px;
}
.inv-cell {
  width: 100%;
  aspect-ratio: 1;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: var(--bg-card);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  transition: all 0.15s;
  position: relative;
  overflow: hidden;
}
.inv-cell:hover { border-color: var(--accent); }
.inv-cell .item-icon { font-size: 16px; }
.inv-cell .item-qty {
  position: absolute;
  bottom: 1px;
  right: 3px;
  font-size: 9px;
  color: var(--text-dim);
}

/* Quality borders */
.q-white { border-color: var(--q-white) !important; }
.q-blue { border-color: var(--q-blue) !important; }
.q-yellow { border-color: var(--q-yellow) !important; }
.q-green { border-color: var(--q-green) !important; }
.q-gold { border-color: var(--q-gold) !important; }
.q-purple { border-color: var(--q-purple) !important; }
.qc-white { color: var(--q-white); }
.qc-blue { color: var(--q-blue); }
.qc-yellow { color: var(--q-yellow); }
.qc-green { color: var(--q-green); }
.qc-gold { color: var(--q-gold); }
.qc-purple { color: var(--q-purple); }

/* ===== SKILL PANEL ===== */
.skill-tree { display: flex; flex-direction: column; gap: 8px; padding: 12px; }
.skill-entry {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-card);
  transition: all 0.15s;
}
.skill-entry.unlocked { border-color: var(--border-glow); }
.skill-entry.locked { opacity: 0.4; }
.skill-icon { font-size: 24px; width: 36px; text-align: center; }
.skill-info { flex: 1; }
.skill-name { font-size: 13px; font-weight: 700; color: var(--text-bright); }
.skill-desc { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.skill-lv { font-size: 10px; color: var(--accent2); }

/* ===== TOOLTIP ===== */
#tooltip {
  position: fixed;
  pointer-events: none;
  z-index: 999;
  background: #0d0d1e;
  border: 1px solid var(--border-glow);
  border-radius: var(--radius);
  padding: 10px;
  min-width: 180px;
  max-width: 240px;
  display: none;
  box-shadow: 0 4px 20px #00000080;
}
.tt-name { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
.tt-type { font-size: 10px; color: var(--text-dim); margin-bottom: 6px; }
.tt-affix { font-size: 11px; color: var(--cyan); margin-top: 2px; }
.tt-actions { display: flex; gap: 6px; margin-top: 8px; border-top: 1px solid var(--border); padding-top: 8px; }
.tt-btn {
  flex: 1;
  padding: 5px;
  border: 1px solid var(--border-glow);
  border-radius: 3px;
  background: var(--bg-hover);
  color: var(--text-bright);
  cursor: pointer;
  font-size: 11px;
  font-family: var(--font-main);
  transition: all 0.15s;
}
.tt-btn:hover { background: var(--accent); }
.tt-btn.drop { border-color: var(--red); color: var(--red); }
.tt-btn.drop:hover { background: var(--red); color: white; }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb { background: var(--border-glow); border-radius: 2px; }

/* ===== NOTIFICATION ===== */
#notif {
  position: fixed;
  top: 60px;
  right: 16px;
  z-index: 998;
  display: flex;
  flex-direction: column;
  gap: 6px;
  pointer-events: none;
}
.notif-item {
  padding: 8px 14px;
  background: var(--bg-card);
  border: 1px solid var(--border-glow);
  border-radius: var(--radius);
  font-size: 12px;
  animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.5s forwards;
  max-width: 240px;
}
@keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes fadeOut { to { opacity: 0; transform: translateX(20px); } }

/* ===== SHOP ===== */
.shop-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-card);
  margin-bottom: 4px;
  cursor: pointer;
  transition: all 0.15s;
}
.shop-item:hover { border-color: var(--accent); background: var(--bg-hover); }
.shop-icon { font-size: 20px; width: 30px; text-align: center; }
.shop-info { flex: 1; }
.shop-name { font-size: 12px; color: var(--text-bright); }
.shop-price { font-size: 11px; color: var(--gold); margin-top: 2px; }

/* Boss button */
.boss-btn {
  width: 100%;
  padding: 10px;
  border: 1px solid #cc3333;
  border-radius: var(--radius);
  background: linear-gradient(135deg, #2a0a0a, #1a0a0a);
  color: #ff6666;
  cursor: pointer;
  font-family: var(--font-main);
  font-size: 13px;
  font-weight: 700;
  transition: all 0.2s;
  text-align: center;
  margin-top: 8px;
}
.boss-btn:hover { background: #cc1111; color: white; border-color: #ff3333; box-shadow: 0 0 16px #ff000066; }
.boss-btn:disabled { opacity: 0.3; cursor: not-allowed; }

.small-label { font-size: 10px; color: var(--text-dim); }

/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: #00000099;
  z-index: 500;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--bg-panel);
  border: 1px solid var(--border-glow);
  border-radius: 8px;
  padding: 20px;
  min-width: 280px;
  max-width: 380px;
  box-shadow: 0 8px 40px #00000099;
}
.modal-title { font-size: 16px; font-weight: 700; color: var(--text-bright); margin-bottom: 12px; }
.modal-body { font-size: 13px; color: var(--text); line-height: 1.6; }
.modal-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
.modal-btn {
  padding: 8px 18px;
  border: 1px solid var(--border-glow);
  border-radius: var(--radius);
  background: var(--bg-card);
  color: var(--text-bright);
  cursor: pointer;
  font-family: var(--font-main);
  transition: all 0.15s;
}
.modal-btn:hover { background: var(--accent); }
.modal-btn.danger { border-color: var(--red); color: var(--red); }
.modal-btn.danger:hover { background: var(--red); color: white; }
</style>
</head>
<body>

<!-- TITLE SCREEN -->
<div id="title-screen" class="screen active">
  <div class="title-logo">永恆深淵</div>
  <div class="title-sub">Eternal Abyss</div>
  <button class="title-btn primary" onclick="showNewGame()">開始新遊戲</button>
  <button class="title-btn" onclick="loadGame()" id="btn-load">讀取存檔</button>
  <button class="title-btn" onclick="showScreen('credits-screen')" style="font-size:12px;padding:8px 20px;margin-top:8px">製作人員</button>
</div>

<!-- NEW GAME SCREEN -->
<div id="newgame-screen" class="screen">
  <div class="ng-title">選擇職業</div>
  <div class="class-grid" id="class-grid"></div>
  <div class="gender-row">
    <button class="gender-btn selected" id="gbtn-male" onclick="selectGender('male')">♂ 男性</button>

// ============================================================
// COMPUTED STATS
// ============================================================
function computeStats() {
  if (!G.cls) return {};
  const c = CLASSES.find(x=>x.id===G.cls);
  let s = {
    maxHp: c.base.hp + G.vit * 12 + G.level * 8,
    atk:   c.base.atk + G.str * 2 + G.level * 3,
    def:   c.base.def + G.vit * 1 + G.level * 1,
    spd:   c.base.spd + G.agi,
    crit:  c.base.crit + Math.floor(G.agi / 2),
    expBonus: 0,
    lootBonus: 0,
    vamp: 0
  };
  // equipment bonuses
  for (const slot of Object.values(G.equip)) {
    if (!slot) continue;
    for (const aff of (slot.affixes||[])) {
      s[aff.key] = (s[aff.key]||0) + aff.val;
    }
  }
  // buffs
  if (buffActive.atk)     s.atk   = Math.floor(s.atk   * 1.20);
  if (buffActive.berserk) { s.spd  = Math.floor(s.spd   * 1.50); s.crit += 20; }
  if (buffActive.bless)   { s.atk  = Math.floor(s.atk   * 1.15); s.def = Math.floor(s.def*1.15); }

  s.crit = Math.min(s.crit, 75);
  return s;
}

function expToNext(lv) { return Math.floor(80 * Math.pow(lv, 1.6)); }

// ============================================================

// ============================================================
function saveGame() {
  localStorage.setItem('eternal_abyss_save', JSON.stringify(G));
  notify('💾 遊戲已儲存！', '#44cc66');
}

function loadGame() {
  const raw = localStorage.getItem('eternal_abyss_save');
  if (!raw) { alert('沒有找到存檔！'); return; }
  G = JSON.parse(raw);
  initGame();
}

function exportSave() {
  const blob = new Blob([JSON.stringify(G,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `eternal_abyss_${G.name}_${Date.now()}.json`;
  a.click();
  notify('📤 存檔已匯出！', '#44cc66');
}

function importSave(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = e => {
    try {
      G = JSON.parse(e.target.result);
      stopBattle();
      initGame();
      notify('📥 存檔已匯入！', '#44cc66');
    } catch { alert('存檔格式錯誤！'); }
  };
  r.readAsText(file);
}

function confirmNewGame() {
  openModal('確認重置','確定要重新開始遊戲嗎？\n目前存檔將被刪除。',[
    {label:'確定重置',cls:'danger',fn:()=>{ localStorage.removeItem('eternal_abyss_save'); stopBattle(); showScreen('title-screen'); closeModal(); }},

}

  renderStats();
  renderTopBar();

function showItemTooltip(item, e, slotRef, isEquipped) {
  tooltipTarget = {item, slotRef, isEquipped};
  const tt = document.getElementById('tooltip');
  const qColor = `var(--q-${item.quality.id})`;
  let html = `<div class="tt-name" style="color:${qColor}">${item.icon} ${item.name}</div>`;
  html += `<div class="tt-type" style="color:${qColor}">[${item.quality.name}] ${item.slotName}</div>`;
  item.affixes.forEach(a => {
    html += `<div class="tt-affix">+${a.val}${a.pct?'%':''} ${a.name.replace('+','')}</div>`;
  });
  html += `<div class="tt-actions">`;
  if (isEquipped) {
    html += `<button class="tt-btn" onclick="unequipItem('${slotRef}')">卸下</button>`;
  } else {
    html += `<button class="tt-btn" onclick="equipItem(${slotRef})">裝備</button>`;
    html += `<button class="tt-btn drop" onclick="dropItem(${slotRef})">丟棄</button>`;
  }
  html += `</div>`;
  tt.innerHTML = html;
  tt.style.display = 'block';
  positionTooltip(e);
}

function positionTooltip(e) {
  const tt = document.getElementById('tooltip');
  let x = e.clientX + 12, y = e.clientY + 12;
  if (x + 240 > window.innerWidth) x = e.clientX - 252;
  if (y + tt.offsetHeight > window.innerHeight) y = e.clientY - tt.offsetHeight - 12;
  tt.style.left = x+'px';
  tt.style.top  = y+'px';
}

function hideTooltip() {
  setTimeout(() => { document.getElementById('tooltip').style.display='none'; }, 100);
}

function equipItem(idx) {
  const item = G.inventory[idx];
  if (!item) return;
  const slotId = item.slot;
  const old = G.equip[slotId];
  G.equip[slotId] = item;
  G.inventory.splice(idx, 1);
  if (old) G.inventory.push(old);
  hideTooltip();
  renderEquipment();
  renderInventory();
  renderStats();
  notify(`✅ 裝備了 ${item.name}`, `var(--q-${item.quality.id})`);
}

function unequipItem(slotId) {
  const item = G.equip[slotId];
  if (!item) return;
  if (G.inventory.length >= 30) { notify('⚠️ 背包已滿！', '#ff4444'); return; }
  G.inventory.push(item);
  G.equip[slotId] = null;
  hideTooltip();
  renderEquipment();
  renderInventory();
  renderStats();
}

function dropItem(idx) {
  G.inventory.splice(idx, 1);
  hideTooltip();
  renderInventory();
}

// ============================================================
// ITEM GENERATION
// ============================================================
function rollQuality(lootBonus) {
  const bonus = lootBonus || 0;
  const weights = QUALITY.map((q,i) => q.weight * (i>=3 ? (1+bonus/100) : 1));
  const total = weights.reduce((a,b)=>a+b,0);
  let r = Math.random()*total;
  for (let i=0;i<QUALITY.length;i++) { r-=weights[i]; if(r<=0) return QUALITY[i]; }
  return QUALITY[0];
}

function generateItem(zoneLv) {
  const slotDef = EQUIP_SLOTS[Math.floor(Math.random()*EQUIP_SLOTS.length)];
  const typeDef = ITEMS[slotDef.id];
  const icon = typeDef.icons[Math.floor(Math.random()*typeDef.icons.length)];
  const s = computeStats();
  const quality = rollQuality(s.lootBonus);
  const lv = zoneLv + Math.floor(Math.random()*5);
  const affixCount = quality.affixCount;
  const shuffled = [...AFFIXES].sort(()=>Math.random()-0.5).slice(0, affixCount);
  const affixes = shuffled.map(a => ({
    key: a.key,
    name: a.name,
    val: Math.floor((a.min + Math.random()*(a.max-a.min)) * quality.mult * (1+lv*0.02)),
    pct: a.pct||false
  }));

  const prefixes = ['神圣','黑暗','炎炎','冰霜','狂暴','古老','虛空','閃電','血腥','永恆'];
  const suffixes = ['之刃','護盾','法袍','箭矢','匕首','鎧甲','手甲','鐵靴','戒環','項飾'];
  const name = prefixes[Math.floor(Math.random()*prefixes.length)] + suffixes[Math.floor(Math.random()*suffixes.length)];

  return { name, icon, slot: slotDef.id, slotName: slotDef.name, quality, affixes, level: lv };
}

// ============================================================
// BATTLE SYSTEM
// ============================================================
function spawnEnemy() {
  const zone = ZONES[G.zone];
  if (bossFight) {
    currentEnemy = { ...zone.boss };
    currentEnemy.maxHp = currentEnemy.hp;
    // Scale boss HP with level difference
    const lvScale = Math.max(1, G.level / zone.minLv);
    currentEnemy.hp = Math.floor(currentEnemy.maxHp * lvScale * 0.5 + currentEnemy.maxHp * 0.5);
    currentEnemy.maxHp = currentEnemy.hp;
    currentEnemy.isBoss = true;
  } else {
    const m = zone.monsters[Math.floor(Math.random()*zone.monsters.length)];
    currentEnemy = { ...m, maxHp: m.hp, isBoss: false };
    const lvDiff = Math.max(0, G.level - zone.minLv);
    const scale = 1 + lvDiff * 0.08;
    currentEnemy.hp   = Math.floor(currentEnemy.hp * scale);
    currentEnemy.maxHp= currentEnemy.hp;
    currentEnemy.atk  = Math.floor(currentEnemy.atk * scale);
    currentEnemy.def  = Math.floor(currentEnemy.def * scale);
    currentEnemy.exp  = Math.floor(currentEnemy.exp * scale);
    currentEnemy.gold = Math.floor(currentEnemy.gold * scale);
  }
  updateEnemyUI();
}

function updateEnemyUI() {
  if (!currentEnemy) return;
  document.getElementById('enemy-sprite').textContent = currentEnemy.icon;
  document.getElementById('enemy-name').textContent = (currentEnemy.isBoss?'👑 ':'')+currentEnemy.name;
  document.getElementById('enemy-hp-fill').style.width = '100%';
  document.getElementById('enemy-hp-text').textContent = `${currentEnemy.hp}/${currentEnemy.maxHp}`;
  document.getElementById('enemy-hp-fill').style.background =
    currentEnemy.isBoss ? 'linear-gradient(90deg,#880011,#cc2233)' : 'linear-gradient(90deg,#226611,#44cc22)';
}

function startBattle() {
  updateZoneHeader();
  spawnEnemy();
  battleRunning = true;
  scheduleBattleTick();
  document.getElementById('battle-toggle').textContent = '⏸ 暫停';
  document.getElementById('battle-toggle').classList.remove('paused');
}

function stopBattle() {
  battleRunning = false;
  if (battleTimer) clearTimeout(battleTimer);
  battleTimer = null;
}

function toggleBattle() {
  battleRunning = !battleRunning;
  const btn = document.getElementById('battle-toggle');
  if (battleRunning) {
    btn.textContent = '⏸ 暫停'; btn.classList.remove('paused');
    scheduleBattleTick();
  } else {
    btn.textContent = '▶ 繼續'; btn.classList.add('paused');
    if (battleTimer) clearTimeout(battleTimer);
  }
}

function setSpeed(sp, btn) {
  battleSpeed = sp;
  document.querySelectorAll('.speed-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function scheduleBattleTick() {
  if (!battleRunning) return;
  const s = computeStats();
  const interval = Math.max(200, Math.floor(1200 / (battleSpeed * (1 + s.spd*0.03))));
  battleTimer = setTimeout(battleTick, interval);
}

function battleTick() {
  if (!battleRunning || !currentEnemy) return;
  const s = computeStats();

  // Skill check
  skillCooldown--;
  let usedSkill = null;
  if (skillCooldown <= 0) {
    const unlockedSkills = (SKILLS_DATA[G.cls] || []).filter(sk => G.level >= sk.lv);
    if (unlockedSkills.length > 0) {
      usedSkill = unlockedSkills[Math.floor(Math.random()*unlockedSkills.length)];
      skillCooldown = 6 + Math.floor(Math.random()*4);
      if (usedSkill.buff) applyBuff(usedSkill.buff, s);
    }
  }

  // Player attacks
  let hits = (usedSkill && usedSkill.hits) ? usedSkill.hits : 1;
  let totalDmg = 0;
  for (let h = 0; h < hits; h++) {
    let dmg = Math.max(1, s.atk - currentEnemy.def + Math.floor(Math.random()*8) - 4);
    if (usedSkill && usedSkill.dmgMult) dmg = Math.floor(dmg * usedSkill.dmgMult);
    const isCrit = (usedSkill && usedSkill.forceCrit) || (Math.random()*100 < s.crit);
    if (isCrit) dmg = Math.floor(dmg * 1.8);
    totalDmg += dmg;
    currentEnemy.hp = Math.max(0, currentEnemy.hp - dmg);
    if (s.vamp > 0) {
      const vampHeal = Math.floor(dmg * s.vamp / 100);
      G.hp = Math.min(s.maxHp, G.hp + vampHeal);
    }

    // Float damage
    showFloatDmg(dmg, isCrit, true);
  }

  // Update enemy HP
  document.getElementById('enemy-hp-fill').style.width = Math.max(0,currentEnemy.hp/currentEnemy.maxHp*100)+'%';
  document.getElementById('enemy-hp-text').textContent = `${currentEnemy.hp}/${currentEnemy.maxHp}`;
  animSprite('player-sprite', 'attack-anim');
  animSprite('enemy-sprite', 'hit-anim');

  let logMsg = '';
  if (usedSkill && !usedSkill.buff) {
    logMsg = `<span class="log-skill">[${usedSkill.name}] </span>`;
  }
  logMsg += `<span class="log-dmg">對 ${currentEnemy.name} 造成 ${totalDmg} 傷害${hits>1?` (${hits}連擊)`:''}</span>`;
  addLog(logMsg);

  // Enemy dies
  if (currentEnemy.hp <= 0) {
    onEnemyDie();
    scheduleBattleTick();
    return;
  }

  // Enemy attacks back
  let eDmg = Math.max(1, currentEnemy.atk - s.def + Math.floor(Math.random()*6) - 3);
  if (buffActive.shield) { eDmg = Math.floor(eDmg*0.4); }
  if (buffActive.evade && Math.random()<0.5) { addLog('<span class="log-miss">閃避了攻擊！</span>'); delete buffActive.evade; }
  else {
    G.hp = Math.max(0, G.hp - eDmg);
    showFloatDmg(eDmg, false, false);
    addLog(`<span class="log-dmg">${currentEnemy.name} 對你造成 ${eDmg} 傷害</span>`);
    animSprite('player-sprite', 'hit-anim');
  }

  // DOT
  if (buffActive.dot) {
    dotTimer--;
    if (dotTimer > 0) {
      const dotDmg = Math.floor(s.atk * 0.3);
      currentEnemy.hp = Math.max(0, currentEnemy.hp - dotDmg);
      addLog(`<span class="log-dmg">毒素: ${dotDmg} 傷害</span>`);
      if (currentEnemy.hp<=0) { onEnemyDie(); scheduleBattleTick(); return; }
    } else delete buffActive.dot;
  }

  document.getElementById('pc-hp-fill').style.width = Math.max(0,G.hp/s.maxHp*100)+'%';
  document.getElementById('pc-hp-text').textContent = `${G.hp}/${s.maxHp}`;

  // Player dies
  if (G.hp <= 0) {
    onPlayerDie(s);
    return;
  }
  renderTopBar();
  scheduleBattleTick();
}

function applyBuff(type, s) {
  buffActive[type] = true;
  if (type==='dot') dotTimer = 5;
  const names = {atk:'攻擊提升',shield:'護盾啟動',bless:'祝福降臨',berserk:'狂戰啟動',evade:'閃避待機',dot:'毒素附加'};
  addLog(`<span class="log-skill">✨ ${names[type]||type}！</span>`);
  setTimeout(()=>{ delete buffActive[type]; }, 8000);
}

function onEnemyDie() {
  G.killCount++;
  document.getElementById('kill-count').textContent = `擊殺: ${G.killCount}`;
  const s = computeStats();
  const expBonus = 1 + (s.expBonus||0)/100;
  const gainedExp = Math.floor(currentEnemy.exp * expBonus);
  const gainedGold = currentEnemy.gold + Math.floor(Math.random()*currentEnemy.gold*0.3);

  G.exp += gainedExp;
  G.gold += gainedGold;
  addLog(`<span class="log-kill">💀 ${currentEnemy.name} 倒下！+${gainedExp}EXP +${gainedGold}💰</span>`);

  // Level up check
  while (G.exp >= expToNext(G.level)) {
    G.exp -= expToNext(G.level);
    G.level++;
    G.attrPts += 3;
    G.hp = computeStats().maxHp; // Full heal on level up
    addLog(`<span class="log-level">🎉 等級提升！現在 Lv.${G.level}！獲得3屬性點</span>`);
    notify(`🎉 升到 Lv.${G.level}！`, '#ffdd00');
    renderMap(); // unlock new zones
  }

  // Loot drop
  const lootChance = 0.25 + (s.lootBonus||0)/100;
  if (Math.random() < lootChance && G.inventory.length < 30) {
    const z = ZONES[G.zone];
    const item = generateItem(z.minLv + Math.floor((z.maxLv-z.minLv)*0.5));
    G.inventory.push(item);
    addLog(`<span class="log-loot">🎁 獲得: <span class="qc-${item.quality.id}">${item.name}</span> [${item.quality.name}]</span>`);
    notify(`🎁 ${item.quality.name}裝備！`, `var(--q-${item.quality.id})`);
    renderInventory();
  }

  renderTopBar();
  renderStats();
  if (bossFight) {
    bossFight = false;
    notify(`👑 Boss 已擊敗！`, '#ffd700');
    document.getElementById('boss-btn').disabled = false;
  }

  // Heal a bit between fights
  const healPct = currentEnemy.isBoss ? 0.3 : 0.1;
  G.hp = Math.min(computeStats().maxHp, G.hp + Math.floor(computeStats().maxHp * healPct));

  spawnEnemy();
}

function onPlayerDie(s) {
  addLog(`<span class="log-kill" style="color:#ff4466">💔 你被 ${currentEnemy.name} 擊倒了！</span>`);
  notify('💔 你已倒下，自動復活...', '#ff4466');
  G.gold = Math.floor(G.gold * 0.9); // Lose 10% gold
  G.hp = Math.floor(s.maxHp * 0.3);
  bossFight = false;
  renderTopBar();
  setTimeout(() => {
    spawnEnemy();
    scheduleBattleTick();
  }, 2000);
}

function fightBoss() {
  if (bossFight) return;
  bossFight = true;
  document.getElementById('boss-btn').disabled = true;
  const zone = ZONES[G.zone];
  addLog(`<span class="log-skill" style="color:#ff6644">⚔️ 挑戰 Boss：${zone.boss.name}！</span>`);
  spawnEnemy();
}

// ============================================================
// SKILLS PANEL
// ============================================================
function renderSkills() {
  const el = document.getElementById('skill-tree');
  el.innerHTML = '';
  const skills = SKILLS_DATA[G.cls] || [];
  skills.forEach(sk => {
    const unlocked = G.level >= sk.lv;
    const div = document.createElement('div');
    div.className = `skill-entry ${unlocked?'unlocked':'locked'}`;
    div.innerHTML = `
      <div class="skill-icon">${sk.icon}</div>
      <div class="skill-info">
        <div class="skill-name">${sk.name}</div>
        <div class="skill-desc">${sk.desc}</div>
        <div class="skill-lv">需要等級 ${sk.lv} ${unlocked?'✅ 已解鎖':'🔒 未解鎖'}</div>
      </div>`;
    el.appendChild(div);
  });
}

// ============================================================
// SHOP
// ============================================================
function renderShop() {
  const el = document.getElementById('shop-list');
  const zone = ZONES[G.zone];
  const zoneLv = zone.minLv;
  el.innerHTML = '<div class="section-title" style="margin-bottom:8px">商品</div>';

  const shopItems = [];
  for (let i = 0; i < 6; i++) {
    const item = generateItem(zoneLv);
    const basePrice = 50 + zoneLv * 10 + item.affixes.length * 20;
    const price = Math.floor(basePrice * ({white:1,blue:1.8,yellow:3,green:4,gold:6,purple:10}[item.quality.id]));
    shopItems.push({item, price});
  }

  shopItems.forEach(({item, price}) => {
    const div = document.createElement('div');
    div.className = `shop-item q-${item.quality.id}`;
    div.innerHTML = `
      <div class="shop-icon">${item.icon}</div>
      <div class="shop-info">
        <div class="shop-name qc-${item.quality.id}">${item.name} [${item.quality.name}]</div>
        <div style="font-size:10px;color:var(--text-dim)">${item.affixes.map(a=>a.name+'+'+a.val+(a.pct?'%':'')).join(' · ')}</div>
        <div class="shop-price">💰 ${price.toLocaleString()}</div>
      </div>`;
    div.onclick = () => {
      if (G.gold < price) { notify('💰 金幣不足！', '#ff4444'); return; }
      if (G.inventory.length >= 30) { notify('⚠️ 背包已滿！', '#ff4444'); return; }
      G.gold -= price;
      G.inventory.push(item);
      notify(`✅ 購買 ${item.name}！`, `var(--q-${item.quality.id})`);
      renderTopBar();
      renderInventory();
      div.remove();
    };
    el.appendChild(div);
  });

  // Heal option
  const s = computeStats();
  const healCost = Math.floor(s.maxHp * 0.5);
  const healDiv = document.createElement('div');
  healDiv.className = 'shop-item';
  healDiv.innerHTML = `<div class="shop-icon">💊</div><div class="shop-info"><div class="shop-name">全額治療</div><div class="shop-price">💰 ${healCost.toLocaleString()}</div></div>`;
  healDiv.onclick = () => {
    if (G.gold < healCost) { notify('💰 金幣不足！', '#ff4444'); return; }
    G.gold -= healCost; G.hp = s.maxHp;
    notify('💊 HP已回滿！', '#44cc66');
    renderTopBar();
  };
  el.appendChild(healDiv);
}

// ============================================================
// ANIMATIONS & LOG
// ============================================================
function animSprite(id, cls) {
  const el = document.getElementById(id);
  el.classList.add(cls);
  setTimeout(()=>el.classList.remove(cls), 200);
}

function showFloatDmg(dmg, isCrit, isPlayerAtk) {
  const area = document.getElementById('battle-area');
  const div = document.createElement('div');
  div.className = 'float-dmg';
  div.textContent = (isCrit?'💥':'-') + dmg;
  div.style.color = isCrit ? '#ffdd00' : (isPlayerAtk ? '#ff8888' : '#ff4466');
  div.style.fontSize = isCrit ? '22px' : '16px';
  const x = isPlayerAtk ? (50+Math.random()*20) : (20+Math.random()*20);
  div.style.left = x+'%';
  div.style.top = '40%';
  area.appendChild(div);
  setTimeout(()=>div.remove(), 900);
}

function addLog(msg) {
  const log = document.getElementById('battle-log');
  const div = document.createElement('div');
  div.innerHTML = msg;
  log.appendChild(div);
  // Keep last 40 lines
  while (log.children.length > 40) log.removeChild(log.firstChild);
  log.scrollTop = log.scrollHeight;
}

// ============================================================
// NOTIFICATIONS
// ============================================================
function notify(msg, color='var(--text-bright)') {
  const el = document.getElementById('notif');
  const div = document.createElement('div');
  div.className = 'notif-item';
  div.style.color = color;
  div.textContent = msg;
  el.appendChild(div);
  setTimeout(()=>div.remove(), 3000);
}

// ============================================================
// MODAL
// ============================================================
function openModal(title, body, actions) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').textContent = body;
  const actEl = document.getElementById('modal-actions');
  actEl.innerHTML = '';
  actions.forEach(a => {
    const btn = document.createElement('button');
    btn.className = `modal-btn ${a.cls||''}`;
    btn.textContent = a.label;
    btn.onclick = a.fn;
    actEl.appendChild(btn);
  });
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }

// ============================================================
// INIT
// ============================================================
window.onload = () => {
  if (localStorage.getItem('eternal_abyss_save')) {
    document.getElementById('btn-load').style.borderColor = 'var(--accent)';
    document.getElementById('btn-load').style.color = 'var(--accent2)';
  }
};
</script>
